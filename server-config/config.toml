# ═══════════════════════════════════════════════════════════════
# ZeroClaw HuanXing — 服务器默认配置
# 路径: server-config/config.toml
#
# 💡 这是项目仓库中的参考配置，服务器部署时需要调整：
#   - 路径：macOS 路径 → /opt/huanxing/ 前缀
#   - api_key：enc2 加密值 → 服务器上用明文或重新加密
#   - server_id：按环境修改（如 huanxing-115-test）
#
# 📋 服务器实际配置: /opt/huanxing/config/config.toml
# 📋 环境变量配置:   /opt/huanxing/config/.env（API Keys）
# ═══════════════════════════════════════════════════════════════


# ┌─────────────────────────────────────────────────────────────┐
# │                    全局 LLM 配置                             │
# │  Guardian/Admin 的默认 provider，租户可在自己的                │
# │  config.toml 中覆盖                                         │
# └─────────────────────────────────────────────────────────────┘

# Guardian 工作区路径（必须设置，程序启动时加载 SOUL.md 等）
workspace_dir = "server-config/guardian"

# LLM API 密钥（本地用 enc2 加密；服务器部署时替换为明文）
api_key = "enc2:77058663e7ce15d65c7d90e2f188278a25b260a99129e956ddffa8738e3a42800bddc1fd0ce13a43e361861851d07cb79d83da220e5d3f1a93772fa30b09ccf82a1054f4e5960b33763d7a57a0679b"

# LLM Provider 配置
# - "anthropic-custom:URL" = Anthropic 原生格式（支持 native tool calling）
# - "custom:URL"           = OpenAI 兼容格式（/v1/chat/completions）
default_provider = "anthropic-custom:https://llm.dcfuture.cn"
default_model = "MiniMax-M2.7"
default_temperature = 0.7

# 单次 LLM 请求超时（秒）
provider_timeout_secs = 30

# 模型/嵌入路由规则（高级功能，留空使用默认）
model_routes = []
embedding_routes = []

# 额外的模型 provider 定义（高级，一般不需要）
[model_providers]

# 额外的 HTTP 头（如需要代理认证等）
[extra_headers]


# ┌─────────────────────────────────────────────────────────────┐
# │                    可观测性                                  │
# └─────────────────────────────────────────────────────────────┘
[observability]
backend = "none"                              # 可选: none / prometheus
runtime_trace_mode = "none"                   # 可选: none / file
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 200


# ┌─────────────────────────────────────────────────────────────┐
# │                    自治与权限（全局默认）                      │
# │  Guardian 的自治设置；租户的权限在模板 config.toml 里定义       │
# └─────────────────────────────────────────────────────────────┘
[autonomy]
level = "full"                                # full = 所有工具自动批准
workspace_only = false                        # false = Guardian 可访问系统路径
allowed_commands = []                         # 空 = 不限制
forbidden_paths = []
max_actions_per_hour = 1000
max_cost_per_day_cents = 10000
require_approval_for_medium_risk = true
block_high_risk_commands = true
shell_env_passthrough = []

# Guardian 自动批准的工具列表
auto_approve = []
always_ask = []
allowed_roots = []
non_cli_excluded_tools = [
    # ═══ 硬件外设（云服务器无 GPIO/STM32）═══
    "hardware_board_info",
    "hardware_memory_map",
    "hardware_memory_read",

    # ═══ 桌面 GUI 工具（服务器无显示器）═══
    "screenshot",           # 截图
    "canvas",               # 渲染到 Web 画布（需浏览器前端）
    "browser",              # 完整浏览器自动化
    "browser_open",         # 打开浏览器窗口
    "browser_delegate",     # 委托 claude CLI 浏览器
    "image_gen",            # FAL 图片生成（未部署）
    "image_info",           # 图片分析（非 CLI 无意义）

    # ═══ 第三方集成（未部署 / 无账号）═══
    "discord_search",       # Discord
    "google_workspace",     # Google Workspace
    "jira",                 # Jira
    "linkedin",             # LinkedIn
    "microsoft365",         # Microsoft 365
    "notion",               # Notion
    "pushover",             # Pushover 推送
    "composio",             # Composio 集成

    # ═══ 系统运维工具（服务器运营用，用户不需要）═══
    "backup",               # 系统备份
    "security_ops",         # 安全运营
    "cloud_ops",            # 云资源管理
    "cloud_patterns",       # 云架构模式
    "proxy_config",         # 代理配置（运行时修改）
    "model_routing_config", # 模型路由配置（运行时修改）
    "model_switch",         # 切换 LLM Provider（运行时修改）
    "data_management",      # 数据管理

    # ═══ SOP 工作流（企业功能，用户不需要）═══
    "sop_execute",
    "sop_list",
    "sop_approve",
    "sop_advance",
    "sop_status",

    # ═══ 多 Agent 协作（用户侧无需直接操作）═══
    "delegate",             # Agent 委托
    "swarm",                # Swarm 模式
    "sessions_history",     # 跨会话历史
    "sessions_list",        # 会话列表
    "sessions_send",        # 跨会话发送

    # ═══ 开发者工具（个人用户不需要）═══
    "git_operations",       # Git 操作
    "claude_code",          # Claude Code CLI 集成
    "project_intel",        # 项目情报分析
    "knowledge",            # 知识图谱（未启用）

    # ═══ 基础设施管理（Guardian/Admin 专用）═══
    "hx_register_user",     # 注册新用户
    "hx_send_sms",          # 发送短信验证码
    "hx_verify_sms",        # 验证短信
    "hx_lookup_sender",     # 查找发送者身份
    "hx_local_find_user",   # 本地查找用户
    "hx_local_bind_channel",# 绑定渠道
    "hx_local_list_users",  # 列出所有用户
    "hx_local_update_user", # 更新用户信息
    "hx_local_stats",       # 服务器统计
    "hx_invalidate_cache",  # 缓存失效

    # ═══ 低价值 / 内部工具 ═══
    "reaction",             # 消息表情回应（渠道层已处理）
    "vi_verify",            # Verifiable Intent 验证（内部测试）
    "text_browser",         # 文本浏览器（lynx/w3m，服务器未必有）
    "calculator",           # 简单计算（LLM 直接计算即可）
    "schedule",             # Shell 任务调度（cron 系列已覆盖）
    "workspace",            # 工作区切换（多租户下由系统管理）
  
    # ═══ MCP 相关（mcp 功能未启用）═══
    "tool_search",          # MCP deferred tools 加载（mcp 未启用时无意义）
]


# ┌─────────────────────────────────────────────────────────────┐
# │                    安全配置                                  │
# └─────────────────────────────────────────────────────────────┘
[security]
roles = []
canary_tokens = true                          # 检测 prompt injection
semantic_guard = false                        # 语义安全过滤

[security.sandbox]
backend = "auto"                              # auto = 按平台自动选择

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "audit.log"
max_size_mb = 100

[security.otp]
enabled = false                               # OTP 验证（生产环境建议开启）

[security.outbound_leak_guard]
enabled = true                                # 防止敏感信息外泄
action = "redact"                             # redact = 自动脱敏
sensitivity = 0.5

[security.url_access]
block_private_ip = true                       # 阻止访问内网 IP（SSRF 防护）
allow_loopback = false


# ┌─────────────────────────────────────────────────────────────┐
# │                    可靠性（LLM 重试/降级）                    │
# └─────────────────────────────────────────────────────────────┘
[reliability]
provider_retries = 2                         # 单个 provider 最多重试次数
provider_backoff_ms = 500                     # 重试退避时间      
fallback_providers = ["custom:https://llm.dcfuture.cn/v1"]    # 降级 provider 列表
api_keys = ["sk-xxx"]
channel_initial_backoff_secs = 2              # 渠道连接初始退避
channel_max_backoff_secs = 60                 # 渠道连接最大退避
scheduler_poll_secs = 15
scheduler_retries = 2

[reliability.model_fallbacks]
# 模型降级映射，例如:
"claude-sonnet-4-6" = ["MiniMax-M2.7","qwen3-coder-next","qwen3.5-plus","claude-sonnet-4-5","gpt-5.3-codex","gpt-5.2-codex","gpt-5.2"]
"claude-sonnet-4-5" = ["MiniMax-M2.7","qwen3.5-plus","qwen3-coder-next","claude-sonnet-4-6","gpt-5.3-codex","gpt-5.2-codex","gpt-5.2"]
"qwen3.5-plus" = ["MiniMax-M2.7","qwen3-coder-next","qwen3.5-plus","claude-sonnet-4-5","gpt-5.3-codex","gpt-5.2-codex","gpt-5.2"]
"MiniMax-M2.7" = ["MiniMax-M2.5","qwen3.5-plus","qwen3-coder-next","claude-sonnet-4-5","gpt-5.3-codex","gpt-5.2-codex","gpt-5.2"]
# ┌─────────────────────────────────────────────────────────────┐
# │                    Agent 核心设置                             │
# └─────────────────────────────────────────────────────────────┘
[agent]
compact_context = true                        # 上下文过长时自动压缩
max_tool_iterations = 15                      # 单次对话最多工具调用轮次
max_history_messages = 100                    # 历史消息保留条数
max_context_tokens = 200000                    # 最大上下文 token 数
parallel_tools = false                        # 并行工具调用（实验性）

[scheduler]
enabled = true
max_tasks = 64
max_concurrent = 4


# ┌─────────────────────────────────────────────────────────────┐
# │                    技能系统                                  │
# └─────────────────────────────────────────────────────────────┘
[skills]
open_skills_enabled = false                   # 开放技能市场
allow_scripts = true                          # 允许技能运行脚本
prompt_injection_mode = "compact"             # compact = 压缩注入技能 prompt

[skills.skill_creation]
enabled = true                               # 用户自建技能
max_skills = 100 


# ┌─────────────────────────────────────────────────────────────┐
# │                    心跳 & 定时任务                            │
# └─────────────────────────────────────────────────────────────┘
[heartbeat]
enabled = true
interval_minutes = 60                         # 心跳间隔（分钟）
max_tasks_per_tick = 3

[cron]
enabled = true
catch_up_on_startup = true                    # 启动时补执行错过的任务
max_run_history = 50


# ┌─────────────────────────────────────────────────────────────┐
# │                    渠道配置（飞书 / NapCat QQ）               │
# └─────────────────────────────────────────────────────────────┘
[channels_config]
cli = true                                    # CLI 交互模式
message_timeout_secs = 300                    # 消息处理超时
ack_reactions = true                          # 收到消息后发送确认表情
show_tool_calls = false                       # 是否在回复中展示工具调用过程
session_persistence = true
session_backend = "sqlite"

# ── 飞书 ──
[channels_config.feishu]
app_id = "cli_a91dacdaca38dcd2"
# app_secret 使用 enc2 加密（服务器部署时替换为对应环境的加密值）
app_secret = "enc2:91901c57d7709f709c7636ba370d9a201e092640c3ae4ca99f2013b22217b7a7b0f0cb796f4d96045e2ad0ffe8fbeadfde835cbbdb2264b4c9024235"
allowed_users = ["*"]                         # * = 允许所有用户
receive_mode = "websocket"                    # websocket = 长连接（推荐）

# ── NapCat（QQ 机器人）──
[channels_config.napcat]
websocket_url = "ws://127.0.0.1:3001"         # NapCat WebSocket 地址
allowed_users = ["*"]

# ── WeChatPadPro (iPad 协议微信) ──
# [channels_config.wechat_pad]
# api_base_url = "http://127.0.0.1:8849"      # WeChatPadPro REST API 地址
# admin_key = "your_admin_key"                # 管理员密钥
# token = ""                                  # 留空自动生成，或填入 /admin/GanAuthKey1 获取的值
# webhook_bind = "0.0.0.0:9850"               # ZeroClaw 监听的回调端口
# webhook_secret = ""                         # (可选) 用于 HMAC-SHA256 签名验证
# wxid = ""                                   # 登录后的微信号 wxid，用于过滤自己发的消息
# allowed_users = ["*"]                       # 允许私聊的 wxid 列表，"*" 表示允许所有
# allowed_groups = []                         # 允许回复的群聊 wxid (结尾带 @chatroom)
# group_at_only = true                        # 群聊中必须 @ 才回复
# rate_limit_per_minute = 20                  # 每分钟最大消息数


# ┌─────────────────────────────────────────────────────────────┐
# │                    记忆系统                                  │
# └─────────────────────────────────────────────────────────────┘
[memory]
backend = "sqlite"                            # sqlite = 本地持久化
auto_save = true                              # 自动保存对话到长期记忆
hygiene_enabled = true                        # 定期清理旧记忆
archive_after_days = 14                       # 14天后归档
purge_after_days = 90                         # 90天后清除
conversation_retention_days = 90
auto_hydrate = true                           # brain.db 丢失时自动恢复
snapshot_enabled = true                       # 启用记忆快照备份
snapshot_on_hygiene = true                    # 清理时自动快照

# ── 向量嵌入（语义搜索）──
embedding_provider = "custom:https://llm.dcfuture.cn/v1"
embedding_model = "text-embedding-v4"         # 通义 text-embedding-v4
embedding_dimensions = 1024
vector_weight = 0.7                           # 向量相似度权重
keyword_weight = 0.3                          # BM25 关键词权重
min_relevance_score = 0.4                     # 最低相关性阈值
embedding_cache_size = 2000
chunk_max_tokens = 512


# ┌─────────────────────────────────────────────────────────────┐
# │                    网关配置                                  │
# └─────────────────────────────────────────────────────────────┘
[gateway]
port = 42618                                  # 网关端口
host = "127.0.0.1"                            # 只监听本地
require_pairing = true                        # 需要配对码连接
allow_public_bind = false
paired_tokens = ["enc2:a747455a73ad81991dbf19588c30842a954e104822dd236e751a6c34f8c9d8ee6407c3afc3a4a3de011efcd61a43d8406f271685517bde7d2047fce6fe0b999dd7149204634e9b38aeedb9662288b9d882f0b72b2f31ae0064f77ef5"]

[gateway.pairing_dashboard]
code_length = 8
code_ttl_secs = 3600
max_pending_codes = 3


# ┌─────────────────────────────────────────────────────────────┐
# │                    网络工具                                  │
# └─────────────────────────────────────────────────────────────┘

# ── 网页搜索 ──
# API Key 建议放在 .env 文件中（TAVILY_API_KEY 等）
[web_search]
enabled = true
provider = "tavily"                           # tavily / brave / exa / jina / duckduckgo
max_results = 5
timeout_secs = 15

# ── 网页抓取 ──
[web_fetch]
enabled = true                                # ⚠️ 服务器上应设为 true
allowed_domains = ["*"]
timeout_secs = 30

# ── 浏览器 ──
[browser]
enabled = false                               # 服务器无 GUI，默认关闭

# ── HTTP 请求 ──
[http_request]
enabled = true                                # ⚠️ 技能脚本可能需要
timeout_secs = 30

# ── 多模态 ──
[multimodal]
max_images = 4
max_image_size_mb = 5
allow_remote_fetch = true


# ┌─────────────────────────────────────────────────────────────┐
# │                    语音合成 (TTS)                             │
# └─────────────────────────────────────────────────────────────┘
[tts]
enabled = true
default_provider = "generic_openai"
default_voice = "Cherry"
default_format = "wav"

# [tts.dashscope]                               # 直连 DashScope（需要单独 api_key）
# api_key = ""
# model = "qwen3-tts-instruct-flash"
# default_voice = "Cherry"

[tts.generic_openai]                             # 通过 LLM 网关（使用用户 api_key）
api_url = "https://llm.dcfuture.cn/v1/audio/speech"
api_key = ""                                     # 租户模板中由用户 api_key 填充
model = "qwen3-tts-instruct-flash"
default_voice = "Kai"


# ┌─────────────────────────────────────────────────────────────┐
# │                    语音识别 (STT)                             │
# └─────────────────────────────────────────────────────────────┘
[transcription]
enabled = true
default_provider = "groq"
api_url = "https://llm.dcfuture.cn/v1/audio/transcriptions"
model = "qwen3-asr-flash-2026-02-10"
# api_key 通过租户 config.toml 或环境变量传入


# ┌─────────────────────────────────────────────────────────────┐
# │                    加密密钥管理                               │
# └─────────────────────────────────────────────────────────────┘
[secrets]
encrypt = true                                # 启用 enc2 加密


# ┌─────────────────────────────────────────────────────────────┐
# │                    委托 & Hooks                              │
# └─────────────────────────────────────────────────────────────┘
[delegate]
timeout_secs = 120
agentic_timeout_secs = 300

[hooks]
enabled = true

[hooks.builtin]
command_logger = false


# ┌─────────────────────────────────────────────────────────────┐
# │                    代理（科学上网）                            │
# │  服务器上通过 systemd Environment 设置 http_proxy 等           │
# └─────────────────────────────────────────────────────────────┘
[proxy]
enabled = false                               # 代理由系统环境变量控制


# ┌─────────────────────────────────────────────────────────────┐
# │                    备份配置                                  │
# └─────────────────────────────────────────────────────────────┘
[backup]
enabled = true
max_keep = 10
include_dirs = ["config", "memory", "audit", "knowledge"]
destination_dir = "state/backups"
compress = true


# ═══════════════════════════════════════════════════════════════
#                    唤星多租户配置
# ═══════════════════════════════════════════════════════════════
#
# 唤星（HuanXing）是 ZeroClaw 的多租户 AI Agent 平台层。
# 每个注册用户获得独立的 Agent workspace、记忆、会话。
#
# 架构:
#   Guardian  → 负责新用户引导、注册
#   Admin     → 管理员专用，系统监控、运维
#   Tenant    → 普通用户的 AI Agent
#
# ═══════════════════════════════════════════════════════════════

[huanxing]
enabled = true

# ── 数据路径（本地开发路径，服务器部署时改为 /opt/huanxing/...）──
db_path = "server-config/data/users.db"                     # 用户数据库
agents_dir = "server-config/agents"                         # 租户 Agent 工作区
guardian_workspace = "server-config/guardian"                # Guardian 工作区
admin_workspace = "server-config/admin"                     # Admin 工作区
common_skills_dir = "server-config/common-skills"           # 公共技能目录
templates_dir = "/Users/mac/openclaw-workspace/huanxing/huanxing-project/huanxing-hub/templates"                   # 模板目录（本地）
hub_dir = "/Users/mac/openclaw-workspace/huanxing/huanxing-project/huanxing-hub"                                                # Hub 目录（服务器上设为 /opt/huanxing/hub）

# ── Admin 配置 ──
admin_channels = ["feishu"]                   # Admin 只在飞书群可用

# ── 租户默认值 ──
default_template = "finance"                  # 新注册时默认模板
default_model = "claude-sonnet-4-5"                # 租户默认模型
default_provider = "anthropic-custom:https://llm.dcfuture.cn"  # 租户默认 provider


# ── 唤星后端 API ──
api_base_url = "https://api.huanxing.dcfuture.cn"
hasn_base_url = "https://api.huanxing.dcfuture.cn"
agent_key = "wNYPBNNl61kwVLWgFW7N1yFJKb4yCqJxjSKy__RtG94"
server_id = "huanxing-local-dev"              # 服务器部署时改为 "huanxing-115-test" 等

# ── 模板系统 ──
[huanxing.templates]
# 模板特定覆盖（一般不需要，从 hub 自动读取）

# ── Hub 自动同步（从 Gitee 拉取最新技能和模板）──
[huanxing.hub_sync]
gitee_repo = "git@gitee.com:youngshunf/huanxing-agent-hub.git"
gitee_branch = "main"
auto_sync_on_startup = true                   # 启动时自动同步
sync_interval_hours = 24                      # 每24小时同步一次

# ── 租户心跳（定期检查租户健康状态）──
[huanxing.tenant_heartbeat]
enabled = true
scan_interval_minutes = 5                     # 每5分钟扫描一次
max_concurrent = 2                            # 最多同时处理2个租户
per_tenant_timeout_secs = 60                  # 每租户心跳超时

# ── 自定义网关图片生成工具 ──
[huanxing.hx_image_gen]
enabled = true
# 默认按顺序降级使用的模型
models = ["dall-e-3"]
# 图片生成 API URL (兼容 OpenAI格式)
api_url = "https://llm.dcfuture.cn/v1/images/generations"
# 如果在这里提供 api_key，将覆盖全局的 api_key
# api_key = "sk-..."


# ═══════════════════════════════════════════════════════════════
#                    以下为默认关闭的可选功能
#               （按需开启，大部分场景不需要修改）
# ═══════════════════════════════════════════════════════════════

[runtime]
kind = "native"

[composio]
enabled = false

[mcp]
enabled = false

[plugins]
enabled = false

