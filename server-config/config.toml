# ── 自治与安全（全局默认）──────────────────────────────────────
[autonomy]
level = "full"
workspace_only = false
allowed_commands = []
forbidden_paths = []
max_actions_per_hour = 1000
max_cost_per_day_cents = 10000
auto_approve = [
  "file_read", "memory_recall",
  "hx_lookup_sender", "hx_local_find_user", "hx_send_sms", "hx_verify_sms",
  "hx_register_user", "hx_local_bind_channel", "hx_invalidate_cache",
  "hx_get_user", "hx_check_quota", "hx_get_subscription", "hx_usage_stats",
  "hx_local_list_users", "hx_local_update_user", "hx_local_stats",
  "hasn_send", "hasn_contacts", "hasn_add_friend", "hasn_inbox", "hasn_respond_request",
]

# ── 安全 ──────────────────────────────────────────────────────
[security]

[security.otp]
enabled = false

[security.outbound_leak_guard]
enabled = true
action = "redact"
sensitivity = 0.5

# ── 心跳（全局调度器）────────────────────────────────────────
[heartbeat]
enabled = true
interval_minutes = 60
max_tasks_per_tick = 3

# ── 代理（本地 Clash 7890）──────────────────────────────────
[proxy]
enabled = false

# ── 搜索 ──────────────────────────────────────────────────────
[web_search]
enabled = true
provider = "tavily"
