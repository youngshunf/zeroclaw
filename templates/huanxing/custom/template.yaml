# ─── 基础信息 ─────────────────────────────────────────
id: "custom"
name: "自定义"
version: "1.0.0"
emoji: "✨"
description: "一张白纸，由你定义——基于 OpenClaw 官方原版模板，自己决定 AI 是谁、怎么说话、能做什么"

# ─── 标签 ─────────────────────────────────────────────
tags:
  - "自定义"
  - "DIY"
  - "原版"
  - "OpenClaw"

# ─── 模型配置 ─────────────────────────────────────────
model: "claude-sonnet-4-6"
temperature: 0.7

# ─── 技能声明 ─────────────────────────────────────────
skills:
  # 模板专属技能（只有选了这个模板才有）
  exclusive:
    []
  # 公共技能（所有模板共享）
  common:
    - "tavily-search"
    - "summarize"
    - "best-image-generation"
    - "data-analysis"
    - "self-improving"
    - "truth-search"
    - "scrapling"

# ─── 文件列表 ─────────────────────────────────────────
files:
  - "SOUL.md"
  - "IDENTITY.md"
  - "AGENTS.md"
  - "USER.md.template"
  - "TOOLS.md"
  - "HEARTBEAT.md"
  - "BOOTSTRAP.md"
  - "MEMORY.md"

# ─── 工具配置 ─────────────────────────────────────────
tools_allow:
  - "huanxing_get_user"
  - "huanxing_get_subscription"
  - "huanxing_check_quota"
  - "huanxing_usage_stats"
  - "huanxing_set_secret"
  - "huanxing_list_secrets"
  - "huanxing_delete_secret"

# ─── 商业 ─────────────────────────────────────────────
pricing:
  tier: "free"
