<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>HuanXing ZeroClaw - Clean Soft Tech UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    :root {
      /* Soft Tech Colors - No Purple */
      --brand-primary: #0ea5e9; /* Sky 500 - Deep clean tech blue */
      --brand-light: #e0f2fe;   /* Sky 100 - For active backgrounds */
      --brand-subtle: #f0f9ff;  /* Sky 50  - For hover states */
      
      --bg-white: #ffffff;
      --bg-offwhite: #fafafa;
      --bg-search: #f4f4f5;
      
      --text-main: #18181b;     /* zinc-900 */
      --text-secondary: #52525b;/* zinc-600 */
      --text-muted: #a1a1aa;    /* zinc-400 */
      
      --border-soft: #f4f4f5;   /* zinc-100 */
      --border-hard: #e4e4e7;   /* zinc-200 */
    }

    body {
      background-color: var(--bg-white);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      overflow: hidden;
    }
    
    .glass-input {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
    }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--border-hard);
      border-radius: 4px;
    }
    
    .logo-gradient {
      background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-border {
      position: relative;
    }
    .logo-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(135deg, #bae6fd, #0284c7);
      z-index: -1;
      opacity: 0.3;
    }
  </style>
</head>
<body class="h-screen w-screen flex flex-col text-[14px]">

  <div class="flex-1 flex overflow-hidden">
    <!-- Left Sidebar (NavRail) -->
    <div class="w-[72px] flex-shrink-0 border-r border-zinc-100 bg-white flex flex-col py-6 items-center">
      <!-- Logo -->
      <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center mb-6 logo-border shadow-sm">
        <i data-lucide="sparkles" class="w-5 h-5 text-sky-500"></i>
      </div>

      <!-- Nav Items Upper -->
      <div class="flex flex-col space-y-3 w-full items-center mb-auto">
        <!-- Active Tab (Agent) -->
        <button class="w-12 h-12 rounded-2xl flex items-center justify-center text-sky-500 bg-sky-50 transition-all flex-col gap-1 relative">
          <i data-lucide="bot" class="w-5 h-5"></i>
          <span class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-4 bg-sky-500 rounded-r-md"></span>
        </button>
        <!-- Inactive Tabs -->
        <button class="w-12 h-12 rounded-2xl flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all">
          <i data-lucide="message-square" class="w-5 h-5"></i>
        </button>
        <button class="w-12 h-12 rounded-2xl flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all">
          <i data-lucide="users" class="w-5 h-5"></i>
        </button>
        <button class="w-12 h-12 rounded-2xl flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all">
          <i data-lucide="layout-grid" class="w-5 h-5"></i>
        </button>
        <button class="w-12 h-12 rounded-2xl flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all">
          <i data-lucide="store" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Nav Items Lower -->
      <div class="flex flex-col space-y-3 w-full items-center mt-auto">
        <button class="w-10 h-10 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button class="w-10 h-10 rounded-full flex gap-1 flex-col items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all text-[10px]">
          <i data-lucide="globe" class="w-5 h-5"></i>
          <span>简体</span>
        </button>
        <button class="w-10 h-10 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-all">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
        <button class="w-10 h-10 rounded-full overflow-hidden mt-2 bg-zinc-100">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar" class="w-full h-full object-cover"/>
        </button>
      </div>
    </div>

    <!-- Middle List (Conversations) -->
    <div class="w-[280px] flex-shrink-0 border-r border-zinc-100 bg-white flex flex-col">
      <!-- Header -->
      <div class="h-[72px] flex items-center justify-between px-5">
        <div class="flex items-center gap-2 font-medium text-[16px] text-zinc-800">
          <i data-lucide="message-square" class="w-4 h-4 text-sky-500"></i>
          会话
        </div>
        <button class="w-8 h-8 rounded-full hover:bg-zinc-50 flex items-center justify-center text-zinc-400 transition-colors">
          <i data-lucide="plus" class="w-5 h-5"></i>
        </button>
      </div>
      
      <!-- Search Bar -->
      <div class="px-4 pb-4">
        <div class="relative flex items-center">
          <i data-lucide="search" class="absolute left-3 w-4 h-4 text-zinc-400"></i>
          <input type="text" placeholder="搜索对话..." class="w-full bg-zinc-50 border border-zinc-100 rounded-full py-2 pl-9 pr-4 text-[13px] focus:outline-none focus:bg-white focus:border-sky-200 focus:ring-2 focus:ring-sky-50 transition-all text-zinc-700 placeholder-zinc-400">
        </div>
      </div>

      <!-- List -->
      <div class="flex-1 overflow-y-auto custom-scrollbar px-3">
        <!-- Group Header -->
        <div class="flex items-center justify-between px-2 py-2 text-zinc-400 group cursor-pointer">
          <div class="flex items-center gap-1.5 text-[12px] font-semibold tracking-wider">
            <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
            <i data-lucide="bot" class="w-3.5 h-3.5"></i>
            DEFAULT
          </div>
          <div class="flex items-center gap-2 text-[12px]">
            <span>3</span>
            <i data-lucide="plus" class="w-3.5 h-3.5 opacity-0 group-hover:opacity-100"></i>
          </div>
        </div>

        <!-- List Items -->
        <div class="space-y-1 mt-1">
          <!-- Item 1 (Inactive) -->
          <div class="flex items-center gap-3 p-3 rounded-2xl hover:bg-zinc-50 cursor-pointer transition-colors group">
            <div class="w-[42px] h-[42px] rounded-xl bg-sky-50 text-sky-500 flex items-center justify-center relative">
              <i data-lucide="bot" class="w-5 h-5"></i>
              <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-400 border-2 border-white rounded-full"></div>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-[14px] font-medium text-zinc-800 truncate">新会话</div>
              <div class="text-[12px] text-zinc-400 truncate mt-0.5">点击开始对话</div>
            </div>
          </div>

          <!-- Item 2 (Active) -->
          <div class="flex items-center gap-3 p-3 rounded-2xl bg-sky-50 cursor-pointer transition-colors">
            <div class="w-[42px] h-[42px] rounded-xl bg-white text-sky-500 flex items-center justify-center relative shadow-sm">
              <i data-lucide="bot" class="w-5 h-5"></i>
              <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-400 border-2 border-white rounded-full"></div>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-[14px] font-medium text-sky-900 truncate">新会话</div>
              <div class="text-[12px] text-sky-500 truncate mt-0.5">点击开始对话</div>
            </div>
          </div>

          <!-- Item 3 (Inactive) -->
          <div class="flex items-center gap-3 p-3 rounded-2xl hover:bg-zinc-50 cursor-pointer transition-colors">
            <div class="w-[42px] h-[42px] rounded-xl bg-sky-50 flex items-center justify-center text-sky-500 relative">
              <i data-lucide="bot" class="w-5 h-5"></i>
              <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-emerald-400 border-2 border-white rounded-full"></div>
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-[14px] font-medium text-zinc-800 truncate">新会话</div>
              <div class="text-[12px] text-zinc-400 truncate mt-0.5">还在吗</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content (Chat Area) -->
    <div class="flex-1 flex flex-col bg-white relative">
      <!-- Chat Header -->
      <div class="h-[72px] flex-shrink-0 border-b border-zinc-100 flex items-center px-6">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-xl bg-sky-50 text-sky-500 flex items-center justify-center">
            <i data-lucide="bot" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="font-medium text-zinc-800 flex items-center gap-2">
              默认 Agent
            </div>
            <div class="text-[12px] flex items-center gap-1.5 mt-0.5 text-zinc-500">
              新会话
              <span class="w-1 h-1 rounded-full bg-emerald-400 ml-1"></span>
              <span class="text-emerald-500">在线</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Middle Empty State -->
      <div class="flex-1 flex flex-col items-center justify-center bg-[#fafafa]/50">
        <!-- New sleek star-sparkle icon using sky gradients -->
        <div class="relative w-24 h-24 mb-6 flex justify-center items-center">
          <i data-lucide="sparkles" class="w-16 h-16 text-sky-400 stroke-[1.5]"></i>
          <div class="absolute inset-0 bg-sky-400 opacity-20 blur-xl rounded-full"></div>
        </div>
        <div class="text-[20px] font-medium text-zinc-700 mb-3 tracking-wide">新对话</div>
        <div class="text-[14px] text-zinc-400">发送消息开始与 默认 Agent 聊天</div>
      </div>

      <!-- Input Area -->
      <div class="flex-shrink-0 px-8 pb-8 pt-2 bg-white">
        <div class="max-w-4xl mx-auto flex flex-col border border-zinc-200 rounded-[24px] bg-white transition-all glass-input focus-within:border-sky-200 focus-within:ring-4 focus-within:ring-sky-50 overflow-hidden">
          
          <textarea rows="3" class="w-full bg-transparent border-none focus:ring-0 text-[15px] text-zinc-800 placeholder-zinc-300 resize-none px-6 pt-5 pb-2 outline-none" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"></textarea>
          
          <div class="flex items-center justify-between px-4 pb-3 pt-1">
            <div class="flex items-center gap-2">
              <button class="w-8 h-8 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-colors">
                <i data-lucide="paperclip" class="w-4 h-4"></i>
              </button>
              <button class="w-8 h-8 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-colors">
                <i data-lucide="pen-line" class="w-4 h-4"></i>
              </button>
              <button class="w-8 h-8 rounded-full flex items-center justify-center text-zinc-400 hover:text-zinc-600 hover:bg-zinc-50 transition-colors">
                <i data-lucide="at-sign" class="w-4 h-4"></i>
              </button>
            </div>
            
            <div class="flex items-center gap-2 pr-2">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span>
              <span class="text-[12px] text-zinc-400">默认 Agent</span>
            </div>
          </div>
        </div>
        
        <div class="text-center mt-3 text-[12px] text-zinc-300 flex items-center justify-center gap-3">
          <span class="bg-zinc-50 px-2 py-0.5 rounded border border-zinc-100">/ 命令</span>
          <span class="bg-zinc-50 px-2 py-0.5 rounded border border-zinc-100">@ 提及</span>
          <span class="bg-zinc-50 px-2 py-0.5 rounded border border-zinc-100">Shift+Enter 换行</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
