<svg xmlns="http://www.w3.org/2000/svg" viewBox="36 36 184 184" width="256" height="256">
  <defs>
    <!-- 主渐变：深空蓝 → 星云紫 → 极光青 -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- 内层星芒渐变（更亮更透） -->
    <linearGradient id="starInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <!-- 光圈渐变 -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.875"/>
      <stop offset="50%" stop-color="#4F46E5" stop-opacity="0.625"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.875"/>
    </linearGradient>
    <!-- 社交连线渐变（轻柔可见） -->
    <linearGradient id="lineGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" stop-opacity="0"/>
      <stop offset="40%" stop-color="#818CF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#818CF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0"/>
    </linearGradient>
    <!-- 星芒发光 -->
    <filter id="starGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 节点发光 -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  

  <!-- 光圈：弥散光晕 -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="#6366F1" stroke-width="24" stroke-opacity="0.1875"/>
  <!-- 光圈：核心细线 -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="url(#ringGrad)" stroke-width="2.0999999999999996"/>

  <!-- 社交网络连线（极细极淡的弧线） -->
  <path d="M128 128 Q 155 85, 188 78" fill="none" stroke="url(#lineGrad1)" stroke-width="1.5"/>
  <path d="M128 128 Q 100 85, 72 82" fill="none" stroke="url(#lineGrad2)" stroke-width="1.5"/>
  <path d="M128 128 Q 160 160, 192 170" fill="none" stroke="url(#lineGrad1)" stroke-width="1.2000000000000002"/>
  <path d="M128 128 Q 95 160, 68 168" fill="none" stroke="url(#lineGrad2)" stroke-width="1.2000000000000002"/>
  <path d="M128 128 Q 128 90, 128 58" fill="none" stroke="#818CF8" stroke-width="0.8999999999999999" stroke-opacity="1"/>
  <path d="M128 128 Q 128 165, 128 198" fill="none" stroke="#818CF8" stroke-width="0.8999999999999999" stroke-opacity="0.9375"/>

  <!-- 八角星芒主体 -->
  <g  transform="translate(128,128)">
    <!-- 外层星芒 -->
    <path d="M0 -52 C5.5 -9.5, 9.5 -5.5, 52 0 C9.5 5.5, 5.5 9.5, 0 52 C-5.5 9.5, -9.5 5.5, -52 0 C-9.5 -5.5, -5.5 -9.5, 0 -52 Z" fill="url(#starGrad)"/>
    <!-- 内层星芒（旋转45°，稍小，更亮） -->
    <path d="M0 -36 C3.8 -6.5, 6.5 -3.8, 36 0 C6.5 3.8, 3.8 6.5, 0 36 C-3.8 6.5, -6.5 3.8, -36 0 C-6.5 -3.8, -3.8 -6.5, 0 -36 Z" fill="url(#starInner)" opacity="0.7" transform="rotate(45)"/>
  </g>

  <!-- 中心白色光核 -->
  <circle cx="128" cy="128" r="6" fill="white" opacity="0.5"/>
  <circle cx="128" cy="128" r="3.5" fill="white" opacity="0.8"/>
  <circle cx="128" cy="128" r="1.8" fill="white"/>

  <!-- 社交网络节点（圆点=人/Agent，带光晕） -->
  <!-- 节点1: 右上 — 人类(暖紫) -->
  <circle cx="188" cy="78" r="4.5" fill="#A78BFA"  opacity="0.75"/>
  <circle cx="188" cy="78" r="4.5" fill="none" stroke="#7C3AED" stroke-width="3.5999999999999996" stroke-opacity="1"/>
  <circle cx="188" cy="78" r="2" fill="#7C3AED" opacity="0.7"/>

  <!-- 节点2: 左上 — Agent(冰蓝) -->
  <circle cx="72" cy="82" r="4.5" fill="#22D3EE"  opacity="0.75"/>
  <circle cx="72" cy="82" r="4.5" fill="none" stroke="#06B6D4" stroke-width="3.5999999999999996" stroke-opacity="1"/>
  <circle cx="72" cy="82" r="2" fill="#06B6D4" opacity="0.7"/>

  <!-- 节点3: 右下 — Agent(靛蓝) -->
  <circle cx="192" cy="170" r="3.8" fill="#818CF8"  opacity="0.625"/>
  <circle cx="192" cy="170" r="3.8" fill="none" stroke="#4F46E5" stroke-width="3" stroke-opacity="0.875"/>
  <circle cx="192" cy="170" r="1.8" fill="#4F46E5" opacity="0.65"/>

  <!-- 节点4: 左下 — 人类(淡紫) -->
  <circle cx="68" cy="168" r="3.8" fill="#A78BFA"  opacity="0.625"/>
  <circle cx="68" cy="168" r="3.8" fill="none" stroke="#7C3AED" stroke-width="3" stroke-opacity="0.875"/>
  <circle cx="68" cy="168" r="1.8" fill="#7C3AED" opacity="0.65"/>

  <!-- 节点5: 上方 — 小节点 -->
  <circle cx="128" cy="55" r="2.5" fill="#67E8F9"  opacity="0.5"/>
  <circle cx="128" cy="55" r="1.5" fill="#06B6D4" opacity="0.5"/>

  <!-- 节点6: 下方 — 小节点 -->
  <circle cx="128" cy="200" r="2.5" fill="#C4B5FD"  opacity="0.5"/>
  <circle cx="128" cy="200" r="1.5" fill="#7C3AED" opacity="1"/>

  <!-- 轨道上的微光脉冲点（模拟数据流动） -->
  <circle cx="175" cy="60" r="1" fill="#22D3EE" opacity="1"/>
  <circle cx="85" cy="60" r="0.8" fill="#A78BFA" opacity="0.875"/>
  <circle cx="198" cy="128" r="0.8" fill="#4F46E5" opacity="0.75"/>
  <circle cx="58" cy="128" r="0.8" fill="#06B6D4" opacity="0.75"/>
  <circle cx="175" cy="195" r="0.8" fill="#818CF8" opacity="0.625"/>
  <circle cx="85" cy="195" r="0.8" fill="#A78BFA" opacity="0.625"/>
</svg>
